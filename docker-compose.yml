services:
  postgres:
    image: postgres:15-alpine
    container_name: seshop-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seshop}
      POSTGRES_USER: ${POSTGRES_USER:-seshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seshop}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seshop} -d ${POSTGRES_DB:-seshop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seshop-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: seshop-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-seshop}
      DB_USERNAME: ${POSTGRES_USER:-seshop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-seshop}
      JWT_SECRET: ${JWT_SECRET:-change-this-development-secret-change-this-development-secret}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      STRIPE_BASE_URL: ${STRIPE_BASE_URL:-https://api.stripe.com/v1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-vnd}
      GHN_ENABLED: ${GHN_ENABLED:-false}
      GHN_BASE_URL: ${GHN_BASE_URL:-https://dev-online-gateway.ghn.vn}
      GHN_TOKEN: ${GHN_TOKEN:-}
      GHN_SHOP_ID: ${GHN_SHOP_ID:-}
      GHN_CREATE_ORDER_PATH: ${GHN_CREATE_ORDER_PATH:-/shiip/public-api/v2/shipping-order/create}
      GHN_TRACK_PATH: ${GHN_TRACK_PATH:-/shiip/public-api/v2/shipping-order/detail}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      META_ENABLED: ${META_ENABLED:-false}
      META_BASE_URL: ${META_BASE_URL:-https://graph.facebook.com/v25.0}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_REDIRECT_URI: ${META_REDIRECT_URI:-http://localhost:8080/api/v1/webhooks/instagram/callback}
      META_SCOPES: ${META_SCOPES:-instagram_basic,pages_show_list,pages_read_engagement,instagram_content_publish}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: seshop-frontend
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
